{# Custom confirm dialog that replaces native browser confirm() for hx-confirm #}
<div id="nitro-confirm-dialog" x-data="nitroConfirm()" x-cloak
     @nitro-confirm.window="show($event.detail.message, $event.detail.resolve)"
     class="fixed inset-0 z-[9999] flex items-center justify-center"
     x-show="open"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0">

    {# Backdrop #}
    <div class="absolute inset-0 bg-gray-900/50" @click="cancel()"></div>

    {# Dialog #}
    <div class="relative bg-white rounded-xl shadow-2xl max-w-sm w-full mx-4 overflow-hidden"
         x-show="open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @keydown.escape.window="cancel()">

        <div class="p-6">
            {# Icon #}
            <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>

            {# Title #}
            <h3 class="text-lg font-semibold text-gray-900 text-center mb-2">Confirmar</h3>

            {# Message #}
            <p class="text-sm text-gray-600 text-center" x-text="message"></p>
        </div>

        {# Actions #}
        <div class="flex border-t border-gray-200">
            <button @click="cancel()"
                    class="flex-1 px-4 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors border-r border-gray-200">
                Cancelar
            </button>
            <button @click="confirm()"
                    x-ref="confirmBtn"
                    class="flex-1 px-4 py-3 text-sm font-bold text-red-600 hover:bg-red-50 transition-colors">
                Confirmar
            </button>
        </div>
    </div>
</div>

<script>
// Override HTMX's native confirm with our styled dialog
document.addEventListener('htmx:confirm', function(e) {
    // Only intercept if there's an hx-confirm attribute
    if (!e.detail.question) return;

    e.preventDefault();

    // Dispatch to Alpine component
    window.dispatchEvent(new CustomEvent('nitro-confirm', {
        detail: {
            message: e.detail.question,
            resolve: function(confirmed) {
                if (confirmed) {
                    e.detail.issueRequest(true);
                }
            }
        }
    }));
});

function nitroConfirm() {
    return {
        open: false,
        message: '',
        _resolve: null,

        show(message, resolve) {
            this.message = message;
            this._resolve = resolve;
            this.open = true;
            this.$nextTick(() => {
                if (this.$refs.confirmBtn) this.$refs.confirmBtn.focus();
            });
        },

        confirm() {
            this.open = false;
            if (this._resolve) this._resolve(true);
            this._resolve = null;
        },

        cancel() {
            this.open = false;
            if (this._resolve) this._resolve(false);
            this._resolve = null;
        }
    };
}
</script>
