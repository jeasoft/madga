<div class="madga-empty">
  <div class="madga-empty-title">{{ title }}</div>
  {% if message %}<p>{{ message }}</p>{% endif %}
  {% if action_label and action_href %}
    <a href="{{ action_href }}" class="madga-btn madga-btn--primary madga-btn--sm" style="margin-top:12px;">{{ action_label }}</a>
  {% endif %}
</div>
