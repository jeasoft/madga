name: Publish to PyPI

# Triggered when a `vX.Y.Z` tag is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens stored as secrets.
#
# One-time setup on pypi.org:
#   Account → Publishing → Add pending publisher
#     PyPI project name: madga
#     Owner:             jeasoft
#     Repository name:   madga
#     Workflow name:     publish.yml
#     Environment name:  pypi
#
# After the first successful publish PyPI promotes "pending publisher" to
# a permanent one. Subsequent releases just need a `git tag vX.Y.Z && git push --tags`.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
      contents: write   # required for creating the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the section between this version's header and the next "## [" header.
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { p=1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release_notes.md
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.notes.outputs.version }}"
          body_path: release_notes.md
          files: dist/*
          draft: false
          prerelease: false
