{% load static madga_studio_tags %}<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>Preview · {{ obj_title|default:"" }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'madga/studio/studio.tailwind.css' %}">
  <style>
    body { margin: 0; background: var(--bg-0); display: flex; flex-direction: column; min-height: 100vh; color: var(--fg-0); }
    .preview-toolbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--bg-1); border-bottom: 1px solid var(--border); }
    .preview-url { flex: 1; font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); padding: 6px 10px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preview-frame-outer { flex: 1; padding: 18px; display: grid; place-items: start center; overflow: auto; }
    iframe.preview-frame { background: white; border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow-md); transition: width .18s, height .18s; width: 100%; height: 100%; min-height: 600px; }
    iframe.preview-frame[data-device="mobile"] { width: 390px; height: 720px; min-height: 720px; }
    iframe.preview-frame[data-device="tablet"] { width: 820px; height: 720px; min-height: 720px; }
    .device-switcher { display: inline-flex; gap: 2px; padding: 2px; background: var(--bg-2); border-radius: 6px; }
    .device-switcher button { padding: 5px 12px; font-size: 12px; color: var(--fg-2); background: transparent; border: none; border-radius: 4px; cursor: pointer; }
    .device-switcher button.active { background: var(--bg-1); color: var(--fg-0); box-shadow: var(--shadow-sm); }
  </style>
</head>
<body>
  <header class="preview-toolbar">
    <a href="javascript:history.back()" class="madga-btn madga-btn--sm madga-btn--ghost">← Volver</a>
    <span class="preview-url">{{ public_url|default:'' }}</span>
    <div class="device-switcher">
      <button data-device="mobile"  {% if device == 'mobile' %}class="active"{% endif %}  onclick="setDevice('mobile')">Mobile</button>
      <button data-device="tablet"  {% if device == 'tablet' %}class="active"{% endif %}  onclick="setDevice('tablet')">Tablet</button>
      <button data-device="desktop" {% if device == 'desktop' or not device %}class="active"{% endif %} onclick="setDevice('desktop')">Desktop</button>
    </div>
    {% if is_published and public_url %}
      <a href="{{ public_url }}" target="_blank" class="madga-btn madga-btn--sm">{% studio_icon "external" size=12 stroke=2 %} Abrir live</a>
    {% else %}
      <span class="madga-btn madga-btn--sm" style="opacity:.5; cursor:not-allowed;" title="Publicá primero para tener URL pública">Live</span>
    {% endif %}
  </header>
  <div class="preview-frame-outer">
    <iframe class="preview-frame" data-device="{{ device|default:'desktop' }}" src="{{ iframe_url|default:public_url|default:'/' }}" loading="lazy"></iframe>
  </div>
  <script>
    function setDevice(d) {
      document.querySelector('iframe.preview-frame').setAttribute('data-device', d);
      document.querySelectorAll('.device-switcher button').forEach(b => b.classList.toggle('active', b.dataset.device === d));
      const u = new URL(window.location); u.searchParams.set('device', d); history.replaceState({}, '', u);
    }
  </script>
</body>
</html>
