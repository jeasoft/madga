{% load madga_studio_tags %}
{# Full picker shell. Lives in a hidden wrapper that the editor rail toggles. #}
<div class="madga-mp-modal" data-madga-mp-target="{{ picker_target }}">
  <div class="madga-mp-head">
    <strong>Elegir desde la biblioteca</strong>
    <button type="button" class="madga-icon-btn" data-madga-mp-close aria-label="Cerrar">
      {% studio_icon "x" size=16 stroke=2 %}
    </button>
  </div>
  <div class="madga-mp-toolbar">
    <input type="search"
           name="q"
           value="{{ search_q }}"
           placeholder="Buscar por nombre o alt text…"
           class="madga-input"
           hx-get="{% url 'madga_studio:media_picker' %}"
           hx-trigger="input changed delay:200ms, search"
           hx-target=".madga-mp-results"
           hx-include="[name='kind']"
           autofocus>
    <select name="kind" class="madga-select"
            hx-get="{% url 'madga_studio:media_picker' %}"
            hx-trigger="change"
            hx-target=".madga-mp-results"
            hx-include="[name='q']">
      <option value="image" {% if current_kind == 'image' %}selected{% endif %}>Imágenes</option>
      <option value="video" {% if current_kind == 'video' %}selected{% endif %}>Videos</option>
      <option value="document" {% if current_kind == 'document' %}selected{% endif %}>Documentos</option>
    </select>
  </div>
  <div class="madga-mp-results">
    {% include "madga/studio/components/media_picker_grid.html" %}
  </div>
  <div class="madga-mp-footer">
    <span class="madga-mp-hint">Click en un archivo para seleccionarlo</span>
    <a href="{% url 'madga_studio:media_list' %}" target="_blank" class="madga-btn madga-btn--sm madga-btn--ghost">{% studio_icon "upload" size=12 stroke=2 %} Subir nuevo</a>
  </div>
</div>
