{# Hero block — title, subtitle, single CTA. #}
<section class="max-w-3xl mx-auto px-4 sm:px-6 py-16 sm:py-24 text-center">
  <h1 class="font-heading text-4xl sm:text-6xl font-semibold tracking-tight leading-[1.05]">
    {{ block.config.title|default:"Bienvenido" }}
  </h1>
  {% if block.config.subtitle %}
    <p class="mt-4 sm:mt-6 text-lg sm:text-xl text-slate-600 dark:text-slate-400 leading-relaxed max-w-2xl mx-auto">{{ block.config.subtitle }}</p>
  {% endif %}
  {% if block.config.cta_label and block.config.cta_url %}
    <a href="{{ block.config.cta_url }}" class="inline-block mt-8 px-6 py-3 rounded-full bg-accent text-white font-medium hover:opacity-90 transition-opacity">
      {{ block.config.cta_label }}
    </a>
  {% endif %}
</section>
