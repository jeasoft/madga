<section class="max-w-3xl mx-auto px-4 sm:px-6 py-16 text-center">
  <h2 class="font-heading text-3xl sm:text-4xl font-semibold tracking-tight">{{ config.title|default:"" }}</h2>
  {% if config.cta_label and config.cta_url %}
    <a href="{{ config.cta_url }}" class="inline-block mt-6 px-6 py-3 rounded-full bg-accent text-white font-medium hover:opacity-90 transition-opacity">{{ config.cta_label }}</a>
  {% endif %}
</section>
