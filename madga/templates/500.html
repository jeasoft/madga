{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% trans "Something went wrong" %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f172a; color:#e2e8f0;
           font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif; padding:24px; }
    .card { max-width: 480px; text-align: center; }
    .code { font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase;
            color: #94a3b8; }
    h1 { margin: 10px 0 12px; font-size: clamp(26px, 4vw, 36px); line-height: 1.15; font-weight: 600; color: #fff; }
    p { color: #cbd5e1; line-height: 1.55; font-size: 14.5px; margin: 0 0 24px; }
    a { display: inline-block; padding: 11px 22px; border-radius: 8px; text-decoration: none;
        background: #6C63FF; color: #fff; font-weight: 500; font-size: 14px; }
    a:hover { opacity: .9; }
  </style>
</head>
<body>
  <main class="card">
    <p class="code">500 · {% trans "Server error" %}</p>
    <h1>{% trans "Something on our end gave out." %}</h1>
    <p>{% trans "Our team has been alerted. Please try again in a moment — if you keep seeing this, drop us a note." %}</p>
    <a href="/">{% trans "Back home" %}</a>
  </main>
</body>
</html>
